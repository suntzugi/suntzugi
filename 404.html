<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Suntzugi</title>
<link rel="icon" type="image/png" href="assets/chraist/favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Zen+Kaku+Gothic+New:wght@300;400&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{scrollbar-width:none;height:100%}
  html::-webkit-scrollbar,body::-webkit-scrollbar{display:none}
  body{
    background:#1e2a4a;color:#d4d8e8;
    font-family:'Zen Kaku Gothic New',sans-serif;font-weight:300;
    display:flex;align-items:center;justify-content:center;
    overflow:hidden;cursor:default;
  }
  canvas{position:fixed;inset:0;z-index:1}
  .vignette{
    position:fixed;inset:0;z-index:2;pointer-events:none;
    background:radial-gradient(ellipse at center,transparent 35%,rgba(10,14,30,.45) 100%);
  }
  .grain{position:fixed;inset:0;z-index:5;pointer-events:none;opacity:.18;mix-blend-mode:screen}
  .wrap{
    position:relative;z-index:3;text-align:center;
    opacity:0;transform:translateY(22px);
    animation:rv 1.2s cubic-bezier(.22,1,.36,1) .2s forwards;
  }
  @keyframes rv{to{opacity:1;transform:translateY(0)}}
  .four04{
    font-family:'Cormorant Garamond',serif;
    font-weight:300;font-style:italic;
    font-size:clamp(5rem,15vw,10rem);
    color:rgba(242,160,181,.85);
    line-height:1;
    letter-spacing:-.02em;
    margin-bottom:.5rem;
  }
  .msg{
    font-family:'Cormorant Garamond',serif;
    font-weight:300;font-style:italic;
    font-size:clamp(1.1rem,3vw,1.6rem);
    color:rgba(212,216,232,.6);
    line-height:1.5;
    margin-bottom:2rem;
  }
  .home{
    font-family:'SF Mono','Fira Code','Cascadia Code','Consolas',monospace;
    font-size:.75rem;letter-spacing:.08em;
    color:rgba(242,160,181,.6);
    text-decoration:underline;
    text-decoration-color:rgba(242,160,181,.2);
    text-underline-offset:3px;
    transition:color .3s ease, text-decoration-color .3s ease;
  }
  .home:hover{
    color:rgba(242,160,181,1);
    text-decoration-color:rgba(242,160,181,.5);
  }
</style>
</head>
<body>

<canvas id="scene"></canvas>
<div class="vignette"></div>
<div class="grain" id="grain"></div>

<div class="wrap">
  <div class="four04">404</div>
  <p class="msg">this page doesn't exist yet.<br>perhaps it will, in time.</p>
  <a class="home" href="/">return home</a>
</div>

<script>
// ── Petal canvas (reuses main site's petal system) ──
(function(){
  const canvas=document.getElementById('scene');
  const ctx=canvas.getContext('2d');
  let W,H;

  function resize(){
    W=canvas.width=window.innerWidth;
    H=canvas.height=window.innerHeight;
  }
  resize();
  window.addEventListener('resize',resize);

  const PC=[
    [245,175,195],[255,140,180],[250,225,235],[230,120,160]
  ];

  function makePetal(r,g,b,sz){
    const s=sz*1.2,p=4,dw=Math.ceil(s*1.2+p*2),dh=Math.ceil(s*1.6+p*2);
    const c=document.createElement('canvas');c.width=dw;c.height=dh;
    const x=c.getContext('2d'),cx=dw/2,cy=dh/2;
    x.fillStyle='rgba('+Math.min(r+20,255)+','+Math.min(g+20,255)+','+Math.min(b+15,255)+',.92)';
    x.beginPath();x.moveTo(cx,cy-s*.7);
    x.bezierCurveTo(cx+s*.55,cy-s*.55,cx+s*.5,cy+s*.3,cx,cy+s*.7);
    x.bezierCurveTo(cx-s*.5,cy+s*.3,cx-s*.55,cy-s*.55,cx,cy-s*.7);x.fill();
    x.strokeStyle='rgba(255,240,248,.18)';x.lineWidth=.4;
    x.beginPath();x.moveTo(cx,cy-s*.45);x.quadraticCurveTo(cx+s*.06,cy,cx,cy+s*.45);x.stroke();
    x.fillStyle='rgba(255,235,245,.35)';x.beginPath();x.arc(cx,cy-s*.05,s*.08,0,Math.PI*2);x.fill();
    return{canvas:c,cx:dw/2,cy:dh/2};
  }

  function makeFlower(r,g,b,sz){
    const d=Math.ceil(sz*7),c=document.createElement('canvas');c.width=d;c.height=d;
    const x=c.getContext('2d'),cx=d/2,cy=d/2;
    const gr=x.createRadialGradient(cx,cy,0,cx,cy,sz*2);
    gr.addColorStop(0,'rgba('+r+','+g+','+b+',.4)');
    gr.addColorStop(.5,'rgba('+r+','+g+','+b+',.12)');
    gr.addColorStop(1,'rgba('+r+','+g+','+b+',0)');
    x.fillStyle=gr;x.fillRect(0,0,d,d);
    x.fillStyle='rgba('+r+','+g+','+b+',.95)';
    for(var i=0;i<5;i++){
      var a=(Math.PI*2*i)/5;
      x.save();x.translate(cx,cy);x.rotate(a);x.translate(sz*.35,0);
      x.beginPath();x.ellipse(0,0,sz*.5,sz*.25,0,0,Math.PI*2);x.fill();x.restore();
    }
    x.fillStyle='rgba(255,240,245,.7)';x.beginPath();x.arc(cx,cy,sz*.12,0,Math.PI*2);x.fill();
    return{canvas:c,cx:d/2,cy:d/2};
  }

  // Pre-render sprites
  const SZ=[3.5,5,6.5];
  const pSpr=[],fSpr=[];
  for(var ci=0;ci<4;ci++){
    pSpr[ci]=[];fSpr[ci]=[];
    var r=PC[ci][0],g=PC[ci][1],b=PC[ci][2];
    for(var si=0;si<SZ.length;si++){
      pSpr[ci][si]=makePetal(r,g,b,SZ[si]);
      fSpr[ci][si]=makeFlower(r,g,b,SZ[si]);
    }
  }

  // Floating petals + flowers
  const items=[];
  const COUNT=35;

  function spawnItem(){
    const isPetal=Math.random()>.2;
    const ci=Math.floor(Math.random()*4);
    const si=Math.floor(Math.random()*3);
    const sprite=isPetal?pSpr[ci][si]:fSpr[ci][si];
    return{
      x:Math.random()*W,
      y:-20-Math.random()*H*.5,
      vx:(Math.random()-.5)*.3,
      vy:.2+Math.random()*.4,
      rot:Math.random()*Math.PI*2,
      vr:(Math.random()-.5)*.01,
      sway:Math.random()*Math.PI*2,
      swayAmp:10+Math.random()*20,
      swaySpeed:.003+Math.random()*.004,
      opacity:.3+Math.random()*.5,
      sprite:sprite,
    };
  }

  for(var i=0;i<COUNT;i++){
    var item=spawnItem();
    item.y=Math.random()*H; // distribute initially
    items.push(item);
  }

  function tick(){
    ctx.clearRect(0,0,W,H);
    for(var i=0;i<items.length;i++){
      var p=items[i];
      p.sway+=p.swaySpeed;
      p.x+=p.vx+Math.sin(p.sway)*p.swayAmp*.005;
      p.y+=p.vy;
      p.rot+=p.vr;

      if(p.y>H+30){
        items[i]=spawnItem();
        items[i].x=Math.random()*W;
        continue;
      }

      ctx.save();
      ctx.globalAlpha=p.opacity;
      ctx.translate(p.x,p.y);
      ctx.rotate(p.rot);
      var s=p.sprite;
      ctx.drawImage(s.canvas,-s.cx,-s.cy);
      ctx.restore();
    }
    requestAnimationFrame(tick);
  }
  tick();
})();

// ── Film grain (same as main site) ──
(function(){
  const g=document.getElementById('grain');
  const c=document.createElement('canvas');
  c.width=256;c.height=256;
  const x=c.getContext('2d');
  const img=x.createImageData(256,256);
  function draw(){
    for(let i=0;i<img.data.length;i+=4){
      const v=Math.random()*255;
      img.data[i]=img.data[i+1]=img.data[i+2]=v;
      img.data[i+3]=25;
    }
    x.putImageData(img,0,0);
    g.style.backgroundImage='url('+c.toDataURL()+')';
    g.style.backgroundSize='256px 256px';
  }
  draw();
  setInterval(draw,120);
})();
</script>
</body>
</html>
